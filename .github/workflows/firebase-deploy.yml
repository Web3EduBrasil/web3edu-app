# Deploy automático para Firebase Hosting quando há push na branch main.
#
# CONFIGURAÇÃO OBRIGATÓRIA — adicione estes Secrets no repositório GitHub:
# (Settings → Secrets and variables → Actions → New repository secret)
#
#   FIREBASE_SERVICE_ACCOUNT   → JSON da service account do Firebase
#     Como obter: Firebase Console → Project Settings → Service accounts
#                 → Generate new private key
#
#   NEXT_PUBLIC_FIREBASE_API_KEY
#   NEXT_PUBLIC_FIREBASE_AUTH
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
#   NEXT_PUBLIC_FIREBASE_APP_ID
#   NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
#   NEXT_PUBLIC_APP_LINK               → ex: https://www.web3edubrasil.online
#   NEXT_PUBLIC_ALCHEMY_RPC_TARGET
#   NEXT_PUBLIC_ALCHEMY_API_KEY
#   NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
#   NEXT_PUBLIC_CONTRACT_ADDRESS
#   ADMIN_SERVICE_ACCOUNT     → Base64 do JSON da service account Admin
#
# PRÉ-REQUISITO LOCAL (executar uma vez):
#   firebase experiments:enable webframeworks
#   firebase use web3edubrasil

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          NEXT_PUBLIC_APP_LINK: ${{ secrets.NEXT_PUBLIC_APP_LINK }}
          NEXT_PUBLIC_ALCHEMY_RPC_TARGET: ${{ secrets.NEXT_PUBLIC_ALCHEMY_RPC_TARGET }}
          NEXT_PUBLIC_ALCHEMY_API_KEY: ${{ secrets.NEXT_PUBLIC_ALCHEMY_API_KEY }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          NEXT_PUBLIC_CONTRACT_ADDRESS: ${{ secrets.NEXT_PUBLIC_CONTRACT_ADDRESS }}
          ADMIN_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_ADMIN_SERVICE_ACCOUNT }}

      - name: Decode Firebase service account
        id: decode-sa
        env:
          SA_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          DECODED=$(printf '%s' "$SA_B64" | tr -d '[:space:]' | base64 -d)
          echo "::add-mask::$DECODED"
          {
            echo "value<<EOF"
            printf '%s\n' "$DECODED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ steps.decode-sa.outputs.value }}
          channelId: live
          projectId: web3edu-57c7f
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
